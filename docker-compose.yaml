services:
  postgres:
    image: postgres:18-alpine
    container_name: finsight_db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finsight_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  finsight_net:
    driver: bridge

volumes:
  postgres_data:

