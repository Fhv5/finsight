server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

application:
  security:
    secret-key: ${JWT_SECRET:defaultSecretKey}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

spring:
  application:
    name: finsight

  datasource:
    url: jdbc:postgresql://${POSTGRES_SERVER:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:finsight_db}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration/postgres

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect